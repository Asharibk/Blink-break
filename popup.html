<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlinkBreak</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    width: 300px;
    background: #1c1c1e;
    color: #f5f5f7;
    padding: 0;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 20px 20px 16px;
    background: linear-gradient(160deg, #2c2c2e 0%, #1c1c1e 100%);
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #30d158, #34aadc);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .app-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #f5f5f7;
  }

  /* Countdown pill */
  .timer-pill {
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #30d158;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  .pill-dot.orange { background: #ff9f0a; }
  .pill-dot.red    { background: #ff453a; animation: none; }

  .pill-label {
    font-size: 13px;
    color: #aeaeb2;
    font-weight: 500;
  }

  .pill-time {
    margin-left: auto;
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    color: #f5f5f7;
  }

  /* ── Settings ── */
  .section {
    padding: 14px 20px;
    border-bottom: 0.5px solid rgba(255,255,255,0.06);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #636366;
    margin-bottom: 10px;
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }

  .setting-row + .setting-row {
    border-top: 0.5px solid rgba(255,255,255,0.05);
  }

  .setting-label {
    font-size: 14px;
    font-weight: 500;
    color: #e5e5ea;
  }

  .setting-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 5px 10px;
  }

  .setting-input-wrap input {
    width: 36px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    font-weight: 700;
    color: #f5f5f7;
    text-align: right;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }

  .setting-input-wrap input::-webkit-inner-spin-button,
  .setting-input-wrap input::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  .setting-unit {
    font-size: 12px;
    color: #636366;
    font-weight: 500;
  }

  /* ── Buttons ── */
  .actions {
    padding: 14px 20px;
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    letter-spacing: -0.2px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #30d158 0%, #34aadc 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(48, 209, 88, 0.25);
  }

  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:hover  { opacity: 0.88; }

  /* Running state — timer is active and settings haven't changed */
  .btn-primary.is-running {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.25);
    box-shadow: none;
    cursor: default;
    pointer-events: none;
    border: 0.5px solid rgba(255,255,255,0.08);
  }

  /* Settings changed while running — highlight to invite restart */
  .btn-primary.settings-changed {
    background: linear-gradient(135deg, #ff9f0a 0%, #ff6b00 100%);
    box-shadow: 0 4px 16px rgba(255, 159, 10, 0.3);
    color: #fff;
    pointer-events: auto;
    cursor: pointer;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .btn-secondary {
    flex: 1;
    padding: 11px 8px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    letter-spacing: -0.2px;
  }

  .btn-secondary:active { transform: scale(0.96); }
  .btn-secondary:hover  { opacity: 0.85; }

  .btn-pause {
    background: rgba(255, 159, 10, 0.18);
    color: #ff9f0a;
    border: 0.5px solid rgba(255, 159, 10, 0.3);
  }

  .btn-stop {
    background: rgba(255, 69, 58, 0.18);
    color: #ff453a;
    border: 0.5px solid rgba(255, 69, 58, 0.3);
  }

  /* Snooze row */
  .snooze-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .snooze-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 9px 10px;
    flex-shrink: 0;
  }

  .snooze-input-wrap input {
    width: 28px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    font-weight: 700;
    color: #f5f5f7;
    text-align: center;
    font-family: inherit;
    -moz-appearance: textfield;
  }

  .snooze-input-wrap input::-webkit-inner-spin-button,
  .snooze-input-wrap input::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  .snooze-unit {
    font-size: 11px;
    color: #636366;
    font-weight: 500;
  }

  .btn-snooze {
    flex: 1;
    padding: 11px 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    background: rgba(10, 132, 255, 0.2);
    color: #0a84ff;
    border: 0.5px solid rgba(10, 132, 255, 0.3);
    letter-spacing: -0.2px;
  }

  .btn-snooze:active { transform: scale(0.96); }
  .btn-snooze:hover  { opacity: 0.85; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-icon">👁</div>
    <span class="app-name">BlinkBreak</span>
  </div>
  <div class="timer-pill">
    <div class="pill-dot" id="statusDot"></div>
    <span class="pill-label" id="statusLabel">Checking...</span>
    <span class="pill-time" id="timeLeft"></span>
  </div>
</div>

<div class="section">
  <div class="section-title">Settings</div>
  <div class="setting-row">
    <span class="setting-label">Work Interval</span>
    <div class="setting-input-wrap">
      <input id="workTime" type="number" value="25" min="1" max="120"/>
      <span class="setting-unit">min</span>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">Break Duration</span>
    <div class="setting-input-wrap">
      <input id="breakTime" type="number" value="300" min="5" max="300"/>
      <span class="setting-unit">sec</span>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" id="startBtn">
    <span id="startBtnText">Start Focus Session</span>
  </button>
  
  <div class="snooze-row">
    <div class="snooze-input-wrap">
      <input id="snoozeTime" type="number" value="5" min="1" max="60"/>
      <span class="snooze-unit">min</span>
    </div>
    <button class="btn-snooze" id="snoozeBtn">Snooze Break</button>
  </div>

  <div class="btn-row" style="margin-top:8px;">
    <button class="btn-secondary btn-pause" id="pauseBtn">Pause</button>
    <button class="btn-secondary btn-stop" id="stopBtn">Stop</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
